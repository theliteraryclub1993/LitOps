name: litops
description: "Lit Life - Enterprise Event Operations Platform for The Literary Club (LIT), Malnad College of Engineering"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Backend
  supabase_flutter: ^2.8.4

  # Barcode & QR
  mobile_scanner: ^6.0.7
  qr_flutter: ^4.1.0

  # PDF
  pdf: ^3.11.3
  printing: ^5.14.2

  # Data Import
  csv: ^6.0.0
  excel: ^4.0.6
  file_picker: ^8.1.2

  # Local Storage / Offline
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.1.4

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.7

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Charts
  fl_chart: ^0.70.2

  # Sharing
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  permission_handler: ^11.4.0
  flutter_secure_storage: ^9.2.4

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  flutter_local_notifications: ^22.0.1
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  mockito: ^5.4.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
